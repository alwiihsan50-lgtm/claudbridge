services:
  - type: web
    name: cloud-clipboard-file-bridge
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLOUD_BRIDGE_TOKEN
        generateValue: true
      - key: CLOUD_BRIDGE_PUBLIC_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: cloudbridge-files
      - key: CLOUD_BRIDGE_FILE_TTL_SECONDS
        value: "86400"
